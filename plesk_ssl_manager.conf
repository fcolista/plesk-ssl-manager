# ==============================================================================
# PLESK SSL MANAGER & UPDATER - CONFIGURATION FILE
# Location: /etc/plesk_ssl_manager.conf OR same directory as script
# ==============================================================================

# System admin email for notifications
NOTIFICATION_EMAIL="sysadmin@tuodominio.com"

# Registration email used for Let's Encrypt / SSL It! account
REGISTRATION_EMAIL="admin@tuodominio.com"

# Renew certificate only if expiring in less than X days
EXPIRY_THRESHOLD_DAYS=30

# --- WEBHOOK NOTIFICATIONS ---
# Set to "telegram", "slack" or "" (disabled)
WEBHOOK_PROVIDER=""

# Telegram Settings (required if WEBHOOK_PROVIDER="telegram")
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""

# Slack Settings (required if WEBHOOK_PROVIDER="slack")
SLACK_WEBHOOK_URL=""
